name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Check
        run: npm run check
      - name: Package smoke
        run: |
          npm pack
          npm install -g ./gameos-*.tgz
          gameos --version
          gameos doctor --json
